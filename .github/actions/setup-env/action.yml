name: 'Setup Build Environment'
description: 'Creates Conda environment and installs Gurobi and its license'
inputs:
  gurobi_wlsaccessid:
    description: 'Gurobi WLS Access ID'
    required: true
  gurobi_wlssecret:
    description: 'Gurobi WLS Secret'
    required: true
  gurobi_licenseid:
    description: 'Gurobi License ID'
    required: true

runs:
  using: "composite"
  steps:
    # 1. Install conda
    # We use the "setup-miniconda" GitHub Action
    # https://github.com/marketplace/actions/setup-miniconda
    - name: Install conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: harmony
        auto-activate-base: false

    # 2. Update conda environment with dependencies listed in environment.yml 
    - name: Create conda environment from environment.yml
      shell: powershell
      run: conda env update -n harmony -f environment.yml

    # ---------------------------
    #     WINDOWS ONLY STEPS
    # ---------------------------

    # Install Gurobi on the runner
    - name: Install Gurobi (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        mkdir dependencies -ErrorAction SilentlyContinue
        cd dependencies
        curl -LO https://packages.gurobi.com/13.0/Gurobi-13.0.1-win64.msi         
        Start-Process msiexec.exe -ArgumentList '/i', 'Gurobi-13.0.1-win64.msi', '/qn', '/norestart' -Wait -PassThru

    # Setup Gurobi WLS License
    # The actual license is stored as a repository secret
    - name: Setup Gurobi License (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (!(Test-Path "C:\gurobi")) {
            New-Item -Path "C:\gurobi" -ItemType Directory -Force
        }

        $licenseContent = @"
        WLSACCESSID=${{ inputs.gurobi_wlsaccessid }}
        WLSSECRET=${{ inputs.gurobi_wlssecret }}
        LICENSEID=${{ inputs.gurobi_licenseid }}
        "@

        Set-Content -Path "C:\gurobi\gurobi.lic" -Value $licenseContent

    # ---------------------------
    #     LINUX ONLY STEPS
    # ---------------------------

    # Install Gurobi on the runner
    - name: Download Gurobi (Linux)
      if: runner.os == 'Ubuntu'
      shell: bash -l {0}
      run: |
        mkdir dependencies
        cd dependencies
        wget https://packages.gurobi.com/13.0/gurobi13.0.1_linux64.tar.gz
        tar -xzf gurobi13.0.1_linux64.tar.gz

    # Setup the Gurobi WLS license
    # The actual license is stored as a repository secret
    - name: Setup Gurobi License
      if: runner.os == 'Ubuntu'
      shell: bash -l {0}
      run: |
        sudo mkdir -p /opt/gurobi
        sudo bash -c "cat <<EOF > /opt/gurobi/gurobi.lic
        WLSACCESSID=${{ inputs.gurobi_wlsaccessid }}
        WLSSECRET=${{ inputs.gurobi_wlssecret }}
        LICENSEID=${{ inputs.gurobi_licenseid }}
        EOF"
        ls -l /opt/gurobi/gurobi.lic
        cat /opt/gurobi/gurobi.lic

    # Download Implot/Imgui dependencies on the runner
    - name: Install Implot/ImGui system dependencies
      if: runner.os == 'Ubuntu'
      shell: bash -l {0}
      run: |
        sudo apt install libgl1-mesa-dev libx11-dev libglfw3-dev

    # ---------------------------
    #     MACOS ONLY STEPS
    # ---------------------------

    # Install Gurobi on the runner
    - name: Install Gurobi
      if: runner.os == 'macOS'
      shell: bash -l {0}
      run: |
        mkdir dependencies
        cd dependencies
        curl -O https://packages.gurobi.com/13.0/gurobi13.0.1_macos_universal2.pkg
        sudo installer -pkg gurobi13.0.1_macos_universal2.pkg -target /

    # Setup the Gurobi WLS license
    # The actual license is stored as a repository secret
    - name: Setup Gurobi License
      if: runner.os == 'macOS'
      shell: bash -l {0}
      run: |
        sudo mkdir -p /Library/gurobi
        sudo bash -c "cat <<EOF > /Library/gurobi/gurobi.lic
        WLSACCESSID=${{ inputs.gurobi_wlsaccessid }}
        WLSSECRET=${{ inputs.gurobi_wlssecret }}
        LICENSEID=${{ inputs.gurobi_licenseid }}
        EOF"
